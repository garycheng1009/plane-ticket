name: Schedule smoke test

on:
  schedule:
    # Minimal scheduler probe. GitHub cron uses UTC.
    # Use off-peak minutes because scheduled runs can be delayed or dropped at busy boundaries.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

jobs:
  echo:
    name: Echo scheduler status
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          date -u
