name: Daily flight price tracker

on:
  schedule:
    - cron: "7 1,7,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  plane-ticket-track:
    name: Plane Ticket Track
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Run tracker
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python tracker.py --config config.json
      - name: Commit price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Update flight price history"
          git push
